<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="100%" style="max-width:600px;font-family:Inter,system-ui,sans-serif">
  <!-- Title -->
  <text x="0" y="18" fill="currentColor" font-size="14" font-weight="600">Impact Bale III sur la structure de financement</text>

  <!-- AVANT -->
  <text x="0" y="52" fill="currentColor" font-size="12" font-weight="500">Avant Bale III</text>

  <!-- Avant bar container -->
  <g transform="translate(0,60)">
    <!-- Banque 75% -->
    <rect x="0" y="0" width="450" height="36" rx="4" fill="#d4d4d4"/>
    <text x="225" y="22" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="500">Banque 75% (11.25M)</text>
    <!-- Fonds propres 25% -->
    <rect x="450" y="0" width="150" height="36" rx="4" fill="#9c4a2e"/>
    <text x="525" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">FP 25% (3.75M)</text>
  </g>

  <!-- APRES -->
  <text x="0" y="122" fill="currentColor" font-size="12" font-weight="500">Apres Bale III</text>

  <!-- Apres bar container -->
  <g transform="translate(0,130)">
    <!-- Banque 60% -->
    <rect x="0" y="0" width="360" height="36" rx="4" fill="#d4d4d4"/>
    <text x="180" y="22" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="500">Banque 60% (9M)</text>
    <!-- Gap zone -->
    <rect x="360" y="0" width="90" height="36" rx="0" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="405" y="16" text-anchor="middle" fill="currentColor" font-size="9" opacity="0.7">Gap</text>
    <text x="405" y="28" text-anchor="middle" fill="currentColor" font-size="9" opacity="0.7">+40-60%</text>
    <!-- Fonds propres 35-40% -->
    <rect x="450" y="0" width="150" height="36" rx="4" fill="#9c4a2e"/>
    <text x="525" y="16" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">FP 35-40%</text>
    <text x="525" y="29" text-anchor="middle" fill="#fff" font-size="10">(5.25-6M)</text>
  </g>
</svg>
