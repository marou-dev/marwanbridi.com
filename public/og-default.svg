<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="630" fill="#faf8f6"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#e8e4e0" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#9c4a2e"/>

  <!-- Left accent bar -->
  <rect x="80" y="200" width="4" height="230" fill="#9c4a2e" rx="2"/>

  <!-- Name -->
  <text x="110" y="280" font-family="Inter, sans-serif" font-weight="600" font-size="72" fill="#1a1a1a" letter-spacing="-1.5">Marwan Bridi</text>

  <!-- Tagline -->
  <text x="110" y="340" font-family="Inter, sans-serif" font-weight="300" font-size="28" fill="#5a5550" letter-spacing="0.5">
    <tspan>Ing&#xe9;nieur civil</tspan>
    <tspan dx="12" fill="#9c4a2e">&#xb7;</tspan>
    <tspan dx="12">Expert immobilier</tspan>
    <tspan dx="12" fill="#9c4a2e">&#xb7;</tspan>
    <tspan dx="12">Gen&#xe8;ve</tspan>
  </text>

  <!-- Decorative element bottom-right -->
  <line x1="900" y1="520" x2="1120" y2="520" stroke="#9c4a2e" stroke-width="1" opacity="0.3"/>
  <circle cx="1120" cy="520" r="3" fill="#9c4a2e" opacity="0.3"/>

  <!-- Bottom border -->
  <rect x="0" y="626" width="1200" height="4" fill="#9c4a2e"/>
</svg>
